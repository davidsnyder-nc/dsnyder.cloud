<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dsnyder.cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Simple scrollbar styling for a more modern look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #111827; /* gray-900 */
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563; /* gray-600 */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280; /* gray-500 */
        }
        
        /* Initial animation styles */
        .animate-on-scroll {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .animate-on-scroll.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Bouncing letter animation */
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .bounce-letter {
            display: inline-block;
        }

        #logo-text.is-animating .bounce-letter {
            animation: bounce 0.5s ease-in-out;
        }

        /* Stagger the letter animation */
        #logo-text.is-animating .bounce-letter:nth-child(1) { animation-delay: 0s; }
        #logo-text.is-animating .bounce-letter:nth-child(2) { animation-delay: 0.05s; }
        #logo-text.is-animating .bounce-letter:nth-child(3) { animation-delay: 0.1s; }
        #logo-text.is-animating .bounce-letter:nth-child(4) { animation-delay: 0.15s; }
        #logo-text.is-animating .bounce-letter:nth-child(5) { animation-delay: 0.2s; }
        #logo-text.is-animating .bounce-letter:nth-child(6) { animation-delay: 0.25s; }
        #logo-text.is-animating .bounce-letter:nth-child(7) { animation-delay: 0.3s; }
        #logo-text.is-animating .bounce-letter:nth-child(8) { animation-delay: 0.35s; }
        #logo-text.is-animating .bounce-letter:nth-child(9) { animation-delay: 0.4s; }
        #logo-text.is-animating .bounce-letter:nth-child(10) { animation-delay: 0.45s; }
        #logo-text.is-animating .bounce-letter:nth-child(11) { animation-delay: 0.5s; }
        #logo-text.is-animating .bounce-letter:nth-child(12) { animation-delay: 0.55s; }
        #logo-text.is-animating .bounce-letter:nth-child(13) { animation-delay: 0.6s; }

        /* Logo glow animation */
        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 5px rgba(239, 68, 68, 0.5);
            }
            50% {
                box-shadow: 0 0 20px rgba(239, 68, 68, 1), 0 0 30px rgba(239, 68, 68, 0.8);
            }
        }

        .logo-glow {
            animation: glow 1.5s ease-in-out;
        }

    </style>
</head>
<body class="bg-gray-900 text-gray-200">

    <!-- Header -->
    <header class="bg-gray-900/80 backdrop-blur-sm sticky top-0 z-50 border-b border-gray-800 opacity-0 -translate-y-full transition-all duration-700 ease-out">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img id="logo-image" src="https://raw.githubusercontent.com/davidsnyder-nc/dsnyder.cloud/refs/heads/main/david.jpg" alt="David Snyder Logo" class="h-12 w-12 rounded-full border-2 border-red-500 object-cover">
                <div id="logo-text" class="text-xl font-bold text-white cursor-pointer select-none">
                    <span class="bounce-letter">d</span><span class="bounce-letter">s</span><span class="bounce-letter">n</span><span class="bounce-letter">y</span><span class="bounce-letter">d</span><span class="bounce-letter">e</span><span class="bounce-letter">r</span><span class="bounce-letter">.</span><span class="bounce-letter">c</span><span class="bounce-letter">l</span><span class="bounce-letter">o</span><span class="bounce-letter">u</span><span class="bounce-letter">d</span>
                </div>
            </div>
            <div class="hidden md:flex items-center space-x-6">
                <a href="#home" class="text-gray-300 hover:text-red-400 transition-colors">Home</a>
                <a href="#projects" class="text-gray-300 hover:text-red-400 transition-colors">Projects</a>
                <a href="https://github.com/davidsnyder-nc" target="_blank" rel="noopener noreferrer" class="text-gray-300 hover:text-red-400 transition-colors">GitHub</a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-12" id="home">

        <!-- Hero Section: Menubot Highlight -->
        <section class="bg-gray-800/50 rounded-2xl shadow-2xl overflow-hidden my-12 ring-1 ring-white/10 animate-on-scroll">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-center">
                <!-- Menubot Screenshot -->
                <div class="p-4 md:p-6">
                    <img 
                        src="https://raw.githubusercontent.com/davidsnyder-nc/menubot/refs/heads/main/menubot.png" 
                        alt="Menubot App Screenshot" 
                        class="rounded-xl shadow-lg w-full h-auto object-cover"
                        onerror="this.onerror=null; this.src='https://placehold.co/600x400/111827/9ca3af?text=Menubot+Screenshot';"
                    >
                </div>
                <!-- Menubot Description -->
                <div class="p-8 md:p-12">
                    <h2 class="text-sm font-semibold text-red-500 uppercase tracking-widest mb-2">Featured Project</h2>
                    <h3 class="text-4xl font-bold text-white mb-4">MenuBot</h3>
                    <p class="text-gray-300 mb-6 text-lg leading-relaxed">
                        An intelligent, AI-powered application designed to streamline and enhance your dining decisions.
                    </p>
                    <a href="https://menubot.app/" target="_blank" rel="noopener noreferrer" class="inline-block bg-red-600 text-white font-semibold py-3 px-8 rounded-lg shadow-md hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 focus:ring-offset-gray-900 transition-all">
                        Visit menubot.app
                    </a>
                </div>
            </div>
        </section>

        <!-- GitHub Repositories Section -->
        <section id="projects">
            <h2 class="text-3xl font-bold text-white text-center mb-12 animate-on-scroll">GitHub</h2>
            <div id="repos-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Loading State -->
                <div id="loading-indicator" class="col-span-full text-center text-gray-400">
                    <div class="flex justify-center items-center space-x-2">
                        <svg class="animate-spin h-5 w-5 text-red-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span>Fetching projects from GitHub...</span>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="bg-transparent mt-20">
        <div class="container mx-auto px-6 py-6 text-center text-gray-500">
            <!-- Footer content can be added here if needed -->
        </div>
    </footer>

    <script>
        // --- Animation Logic ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    observer.unobserve(entry.target); // Animate only once
                }
            });
        }, { threshold: 0.1 }); // Trigger when 10% of the element is visible

        // Observe all elements with the class initially
        document.querySelectorAll('.animate-on-scroll').forEach(el => {
            observer.observe(el);
        });
        
        // --- Header and Logo Animation ---
        const logoText = document.getElementById('logo-text');
        const logoImage = document.getElementById('logo-image');
        const letters = logoText.querySelectorAll('.bounce-letter');
        const lastLetter = letters[letters.length - 1];

        function playBounceAnimation() {
            if (!logoText.classList.contains('is-animating')) {
                logoText.classList.add('is-animating');
            }
        }

        // Clean up animation class after it finishes to allow re-triggering
        lastLetter.addEventListener('animationend', () => {
            logoText.classList.remove('is-animating');
        });

        // Trigger bounce on hover
        logoText.addEventListener('mouseenter', playBounceAnimation);

        // Animate header on page load
        window.addEventListener('load', () => {
            const header = document.querySelector('header');
            header.classList.remove('opacity-0', '-translate-y-full');
            
            // Trigger bounce and glow animations shortly after header appears
            setTimeout(() => {
                playBounceAnimation();
                logoImage.classList.add('logo-glow');
            }, 700); // Should be same as header duration
        });

        // Clean up glow animation class after it finishes
        logoImage.addEventListener('animationend', () => {
            logoImage.classList.remove('logo-glow');
        });


        // --- GitHub API Fetch ---
        const GITHUB_USERNAME = 'davidsnyder-nc';
        const reposContainer = document.getElementById('repos-container');
        const loadingIndicator = document.getElementById('loading-indicator');

        async function fetchRepos() {
            try {
                const response = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&direction=desc`);
                if (!response.ok) {
                    throw new Error(`GitHub API returned a ${response.status} status.`);
                }
                const repos = await response.json();
                
                // Hide loading indicator
                loadingIndicator.style.display = 'none';

                // Filter out specified repositories
                let filteredRepos = repos.filter(repo => {
                    const repoName = repo.name.toLowerCase();
                    return repoName !== 'dsnyder.cloud' && 
                           repoName !== 'davidsnyder-nc.github.io';
                });

                // Sort the filtered repositories alphabetically by name
                filteredRepos.sort((a, b) => a.name.localeCompare(b.name));

                if (filteredRepos.length === 0) {
                     reposContainer.innerHTML += `<p class="col-span-full text-center text-gray-400">No other public repositories found.</p>`;
                     return;
                }

                const specialRepoWebsites = {
                    'menubot': 'https://menubot.app',
                    'newsbear': 'https://newsbear.app',
                    'briefnews': 'https://briefnews.app'
                };

                filteredRepos.forEach((repo, index) => {
                    const repoCard = document.createElement('div');
                    repoCard.className = 'bg-gray-800/50 rounded-xl p-6 flex flex-col justify-between ring-1 ring-white/10 shadow-lg animate-on-scroll';
                    repoCard.style.transitionDelay = `${index * 100}ms`; // Stagger effect
                    
                    const description = repo.description || 'No description available.';
                    let websiteLinkHTML = '';
                    const repoNameLower = repo.name.toLowerCase();

                    // Check if the current repo has a special website link
                    if (specialRepoWebsites[repoNameLower]) {
                        const url = specialRepoWebsites[repoNameLower];
                        websiteLinkHTML = `
                            <a href="${url}" target="_blank" rel="noopener noreferrer" class="text-sm font-medium text-red-400 hover:text-red-300">
                                Visit Website &rarr;
                            </a>
                        `;
                    }

                    repoCard.innerHTML = `
                        <div>
                            <h3 class="text-xl font-bold text-white mb-2">${repo.name}</h3>
                            <p class="text-gray-400 text-sm mb-4 h-20 overflow-hidden">${description}</p>
                        </div>
                        <div class="mt-4 flex justify-between items-center gap-4">
                            <span class="text-xs text-gray-500">${repo.language ? `<span class="inline-block w-3 h-3 rounded-full bg-red-500 mr-1"></span>${repo.language}` : ''}</span>
                            <div class="flex items-center gap-4 flex-shrink-0">
                                ${websiteLinkHTML}
                                <a href="${repo.html_url}" target="_blank" rel="noopener noreferrer" class="text-sm font-medium text-red-400 hover:text-red-300">
                                    GitHub &rarr;
                                </a>
                            </div>
                        </div>
                    `;
                    reposContainer.appendChild(repoCard);
                    // IMPORTANT: Observe the newly created card
                    observer.observe(repoCard);
                });

            } catch (error) {
                console.error("Failed to fetch GitHub repositories:", error);
                loadingIndicator.style.display = 'none';
                reposContainer.innerHTML = `<p class="col-span-full text-center text-red-400">Could not load projects. Please try again later.</p>`;
            }
        }

        // Fetch repositories on page load
        fetchRepos();
    </script>

</body>
</html>
